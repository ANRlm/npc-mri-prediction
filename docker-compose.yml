version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mri-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - mri-network

  backend:
    build:
      context: ./MRI_backend
      dockerfile: Dockerfile
    container_name: mri-backend
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - ./MRI_backend/predict_backend.py:/app/predict_backend.py
      - ./MRI_backend/models:/app/models
      - ./MRI_backend/data:/app/data
      - ./MRI_backend/output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=models/adasyn_cox_model.pkl
      - SCALER_PATH=models/scaler.pkl
      - INFO_PATH=models/adasyn_model_info.pkl
      - FEATURES_PATH=data/flat_statistics.csv
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-in-production}
      - JWT_EXPIRES_DAYS=${JWT_EXPIRES_DAYS:-7}
      - REGISTER_CODE=${REGISTER_CODE:-123456}
    depends_on:
      - mongodb
    networks:
      - mri-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mri-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mri-network

networks:
  mri-network:
    driver: bridge

volumes:
  mongodb_data:
